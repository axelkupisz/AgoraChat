<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080806">
<title>Agora</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080806;--bd-nav:#141412;--bd-subtle:#1a1a18;--bd-mid:#1e1e1c;--bd-hover:#444444;
  --tx-primary:#ccc8c0;--tx-secondary:#a0a09c;--tx-tertiary:#909090;
  --tx-muted:#383634;--tx-dimmer:#282826;--tx-ghost:#1e1e1c;
  --wm-nav:#3a3836;--logo-nav:#302e2c;--logo-hero:#c8c4bc;
  --font-sans:-apple-system,'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;
  --br:8px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-sans);background:var(--bg);color:var(--tx-primary);display:flex;flex-direction:column}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .3s}
.scr.off{opacity:0;pointer-events:none}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;height:56px;background:var(--bg);border-bottom:0.5px solid var(--bd-nav);flex-shrink:0;position:relative;z-index:10}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-wordmark{font-size:12px;font-weight:300;letter-spacing:0.25em;text-transform:uppercase;color:var(--wm-nav)}
.btn-nav{background:transparent;border:0.5px solid var(--bd-subtle);color:var(--tx-muted);padding:7px 16px;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;border-radius:var(--br);cursor:pointer;font-family:var(--font-sans);transition:border-color .25s,color .25s}
.btn-nav:hover{border-color:var(--bd-hover);color:var(--tx-primary)}

/* HERO */
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;min-height:480px;position:relative;overflow:hidden}
#ouroboros-hero{position:absolute;opacity:0;width:320px;height:320px}
#agora-title{position:absolute;font-size:clamp(52px,9vw,80px);font-weight:200;letter-spacing:0.2em;text-transform:uppercase;color:var(--tx-primary);opacity:0;transform:scale(0.82);display:flex;pointer-events:none}
#agora-title span{display:inline-block;transition:none}
#form-container{opacity:0;display:flex;flex-direction:column;align-items:center;width:100%;max-width:260px;position:relative;z-index:2}
.tagline{font-size:10px;font-weight:400;letter-spacing:0.14em;text-transform:uppercase;color:var(--tx-muted);margin-bottom:32px;text-align:center;line-height:1.6}
.field-group{margin-bottom:20px;width:100%}
.field-label{display:block;font-size:9px;font-weight:400;letter-spacing:0.14em;text-transform:uppercase;color:var(--tx-dimmer);margin-bottom:8px}
.field{width:100%;background:transparent;border:none;border-bottom:0.5px solid #1c1c1a;color:var(--tx-secondary);font-size:14px;font-family:var(--font-sans);padding:7px 0;outline:none;transition:border-color .2s}
.field:focus{border-bottom-color:var(--bd-hover)}
.field::placeholder{color:#181816}
.field-code{font-family:var(--font-mono);letter-spacing:0.28em;font-size:15px;text-transform:uppercase}
.btn-enter{width:100%;background:transparent;border:0.5px solid var(--bd-mid);color:var(--tx-tertiary);padding:12px;font-size:9px;letter-spacing:0.20em;text-transform:uppercase;border-radius:var(--br);cursor:pointer;font-family:var(--font-sans);transition:border-color .25s,color .25s;margin-top:8px;margin-bottom:18px}
.btn-enter:hover{border-color:#555555;color:#e0dcd4}
.link-secondary{color:#222220;font-size:10px;cursor:pointer;background:none;border:none;font-family:var(--font-sans);transition:color .2s}
.link-secondary:hover{color:#555555}
.err{font-size:10px;color:#664444;letter-spacing:0.1em;margin-top:8px;min-height:14px;text-align:center}

/* FOOTER */
footer{display:flex;align-items:center;justify-content:center;gap:32px;padding:16px 32px;background:var(--bg);border-top:0.5px solid var(--bd-nav);flex-shrink:0}
.footer-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.footer-label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--tx-ghost)}
.footer-val{font-size:10px;color:#1a1a18}

/* CHAT */
#s-chat{background:var(--bg)}
.chat-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;height:56px;background:var(--bg);border-bottom:0.5px solid var(--bd-nav);flex-shrink:0}
.chat-nav-left{display:flex;align-items:center;gap:10px}
.chat-nav-room{font-family:var(--font-mono);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--tx-muted)}
.chat-status{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--tx-dimmer);letter-spacing:0.1em}
.sdot{width:5px;height:5px;border-radius:50%;background:#2a2a28;transition:background .4s,box-shadow .4s;flex-shrink:0}
.sdot.on{background:#4a6a5a;box-shadow:0 0 6px rgba(74,106,90,.4)}
.btn-close{background:transparent;border:0.5px solid #2a1818;color:#5a3030;padding:7px 14px;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;border-radius:var(--br);cursor:pointer;font-family:var(--font-sans);transition:border-color .25s,color .25s}
.btn-close:hover{border-color:#664444;color:#c08080}
.btn-leave{background:transparent;border:0.5px solid var(--bd-subtle);color:var(--tx-dimmer);padding:7px 14px;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;border-radius:var(--br);cursor:pointer;font-family:var(--font-sans);transition:border-color .25s,color .25s}
.btn-leave:hover{border-color:var(--bd-hover);color:var(--tx-tertiary)}

#msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:4px;min-height:0}
#msgs::-webkit-scrollbar{width:0}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:40px;pointer-events:none}
.ce-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--tx-ghost)}
.ce-sub{font-size:11px;color:#222220;line-height:1.7;letter-spacing:0.05em}
.msg-row{display:flex;flex-direction:column;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg-row.me{align-items:flex-end}.msg-row.them{align-items:flex-start}
.msg-nick{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--tx-ghost);margin-bottom:4px;padding:0 4px}
.msg-bubble{max-width:72%;padding:9px 14px;font-size:13px;line-height:1.6;word-break:break-word;border:0.5px solid var(--bd-subtle);border-radius:var(--br);color:var(--tx-secondary);background:transparent}
.msg-row.me .msg-bubble{color:var(--tx-primary);border-color:#2a2a28;background:#0e0e0c}
.msg-time{font-size:9px;color:var(--tx-ghost);margin-top:3px;padding:0 4px;font-family:var(--font-mono);letter-spacing:0.05em}
.sys-msg{text-align:center;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--tx-ghost);padding:8px}

.chat-ftr{display:flex;align-items:flex-end;gap:10px;padding:14px 24px;background:var(--bg);border-top:0.5px solid var(--bd-nav);flex-shrink:0}
#inp{flex:1;background:transparent;border:none;border-bottom:0.5px solid #1c1c1a;color:var(--tx-secondary);font-size:13px;font-family:var(--font-sans);padding:7px 0;outline:none;resize:none;max-height:100px;line-height:1.5;transition:border-color .2s}
#inp:focus{border-bottom-color:var(--bd-hover)}
#inp::placeholder{color:#181816}
#inp:disabled{opacity:.4}
.btn-send{background:transparent;border:0.5px solid var(--bd-mid);color:var(--tx-tertiary);padding:8px 16px;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;border-radius:var(--br);cursor:pointer;font-family:var(--font-sans);transition:border-color .25s,color .25s;white-space:nowrap;flex-shrink:0}
.btn-send:hover:not(:disabled){border-color:#555555;color:var(--tx-primary)}
.btn-send:disabled{opacity:.3;cursor:not-allowed}

/* SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(8,8,6,.9);z-index:100;display:flex;align-items:flex-end;justify-content:center;transition:opacity .25s}
.sheet-overlay.off{opacity:0;pointer-events:none}
.sheet{background:var(--bg);border-top:0.5px solid var(--bd-nav);padding:28px 32px 40px;width:100%;max-width:480px;animation:su .28s ease}
@keyframes su{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
.sheet-handle{width:32px;height:1px;background:var(--bd-nav);margin:0 auto 24px}
.sheet-title{font-size:9px;font-weight:400;letter-spacing:0.2em;text-transform:uppercase;color:var(--tx-dimmer);margin-bottom:16px}
</style>
</head>
<body>

<div class="scr" id="s-land">
  <nav>
    <div class="nav-left">
      <svg id="ouroboros-nav" width="18" height="18" viewBox="0 0 60 60"></svg>
      <span class="nav-wordmark">Agora</span>
    </div>
    <button class="btn-nav" onclick="showNameSheet('host')">Create a room</button>
  </nav>
  <div class="hero">
    <svg id="ouroboros-hero" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="agora-title"><span>A</span><span>G</span><span>O</span><span>R</span><span>A</span></div>
    <div id="form-container">
      <p class="tagline">speak freely.<br>leave nothing behind.</p>
      <div class="field-group">
        <label class="field-label">your name</label>
        <input class="field" id="land-name" type="text" placeholder="——" maxlength="28" autocomplete="off">
      </div>
      <div class="field-group">
        <label class="field-label">room code</label>
        <input class="field field-code" id="land-code" type="text" placeholder="· · · · · ·" maxlength="6" autocomplete="off" autocorrect="off" spellcheck="false"
          oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')" onkeydown="if(event.key==='Enter')tryJoin()">
      </div>
      <button class="btn-enter" onclick="tryJoin()">Enter the agora</button>
      <button class="link-secondary" onclick="showNameSheet('host')">create a room instead →</button>
      <div class="err" id="err-msg"></div>
    </div>
  </div>
  <footer>
    <div class="footer-item"><span class="footer-label">identity</span><span class="footer-val">No accounts</span></div>
    <div class="footer-item"><span class="footer-label">encryption</span><span class="footer-val">AES-256</span></div>
    <div class="footer-item"><span class="footer-label">after</span><span class="footer-val">No trace</span></div>
  </footer>
</div>

<div class="scr off" id="s-chat">
  <div class="chat-nav">
    <div class="chat-nav-left">
      <svg id="ouroboros-chat-nav" width="16" height="16" viewBox="0 0 60 60"></svg>
      <div>
        <div class="chat-nav-room" id="chat-room-code"></div>
        <div class="chat-status" style="margin-top:3px"><span class="sdot" id="sdot"></span><span id="chat-st">connecting</span></div>
      </div>
    </div>
    <button class="btn-close" id="btn-close" onclick="closeRoom()" style="display:none">Close room</button>
    <button class="btn-leave" id="btn-leave" onclick="leaveRoom()" style="display:none">Leave</button>
  </div>
  <div id="msgs">
    <div class="chat-empty" id="chat-empty">
      <div class="ce-label">Encrypted channel</div>
      <div class="ce-sub">messages are encrypted before leaving your device<br>no one else can read this</div>
    </div>
  </div>
  <div class="chat-ftr">
    <textarea id="inp" placeholder="write something" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)" disabled></textarea>
    <button class="btn-send" id="btn-send" onclick="sendMsg()" disabled>send</button>
  </div>
</div>

<div class="sheet-overlay off" id="sheet-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">your name</div>
    <input class="field" id="sheet-name" type="text" placeholder="——" maxlength="28" autocomplete="off"
      style="margin-bottom:20px" onkeydown="if(event.key==='Enter')confirmName()">
    <button class="btn-enter" onclick="confirmName()" style="margin-bottom:0">Continue →</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.2/mqttws31.min.js"></script>
<script>
function renderOuroboros(svgEl,cx,cy,r,color,segments=90){
  svgEl.innerHTML='';
  const lines=[];
  for(let i=0;i<segments;i++){
    const p=i/segments;
    const sw=0.5+4.5*Math.sin(p*Math.PI*0.92+0.08);
    const op=Math.max(0.04,Math.min(1,0.08+0.92*Math.sin(p*Math.PI*0.90+0.05)));
    const a1=(i/segments)*Math.PI*2-Math.PI/2;
    const a2=((i+1)/segments)*Math.PI*2-Math.PI/2;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',cx+r*Math.cos(a1));line.setAttribute('y1',cy+r*Math.sin(a1));
    line.setAttribute('x2',cx+r*Math.cos(a2));line.setAttribute('y2',cy+r*Math.sin(a2));
    line.setAttribute('stroke',color);line.setAttribute('stroke-width',sw);
    line.setAttribute('stroke-linecap','round');line.setAttribute('opacity',0);
    line.dataset.opacity=op;svgEl.appendChild(line);lines.push(line);
  }
  return lines;
}

// Static nav
const navLines=renderOuroboros(document.getElementById('ouroboros-nav'),30,30,22,'#302e2c');
navLines.forEach(l=>l.setAttribute('opacity',l.dataset.opacity));
const chatNavLines=renderOuroboros(document.getElementById('ouroboros-chat-nav'),30,30,22,'#302e2c');
chatNavLines.forEach(l=>l.setAttribute('opacity',l.dataset.opacity));

// Hero animation
const heroSvg=document.getElementById('ouroboros-hero');
const agoraEl=document.getElementById('agora-title');
const formEl=document.getElementById('form-container');
const heroLines=renderOuroboros(heroSvg,160,160,148,'#c8c4bc');

function runIntro(){
  heroSvg.style.opacity='1';
  heroLines.forEach((line,i)=>{
    setTimeout(()=>{line.style.transition='opacity 0.08s ease';line.setAttribute('opacity',line.dataset.opacity);},i*16);
  });
  setTimeout(()=>{
    agoraEl.style.transition='transform 2.2s cubic-bezier(0.25,0.46,0.45,0.94),opacity 2s ease-out';
    agoraEl.style.opacity='1';agoraEl.style.transform='scale(1)';
    heroSvg.style.transition='opacity 1.4s ease';heroSvg.style.opacity='0';
  },1600);
  const drifts=[{dx:'-50px',dy:'-56px'},{dx:'-22px',dy:'-68px'},{dx:'0px',dy:'-72px'},{dx:'22px',dy:'-68px'},{dx:'50px',dy:'-56px'}];
  const letters=agoraEl.querySelectorAll('span');
  setTimeout(()=>{
    letters.forEach((span,i)=>{
      setTimeout(()=>{
        span.style.transition='opacity 1.5s ease,transform 1.6s ease,filter 1.5s ease';
        span.style.opacity='0';span.style.filter='blur(18px)';
        span.style.transform=`translate(${drifts[i].dx},${drifts[i].dy})`;
      },i*90);
    });
  },3800);
  setTimeout(()=>{
    formEl.style.transition='opacity 1.2s ease';formEl.style.opacity='1';
    document.getElementById('land-name').focus();
  },5200);
}
window.addEventListener('load',()=>setTimeout(runIntro,200));

// CRYPTO
async function deriveKey(code){
  const raw=await crypto.subtle.importKey('raw',new TextEncoder().encode(code),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:new TextEncoder().encode('agora-v1'),iterations:120000,hash:'SHA-256'},raw,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function enc(key,txt){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(txt));
  const out=new Uint8Array(12+ct.byteLength);out.set(iv);out.set(new Uint8Array(ct),12);
  return btoa(String.fromCharCode(...out));
}
async function dec(key,b64){
  try{const b=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b.slice(0,12)},key,b.slice(12));return new TextDecoder().decode(pt);}catch{return null;}
}
function rnd(n=8){return Array.from(crypto.getRandomValues(new Uint8Array(n))).map(b=>b.toString(16).padStart(2,'0')).join('');}
function genCode(){const c='BCDFGHJKLMNPQRSTVWXZ',v='AEIOU';let s='';for(let i=0;i<6;i++)s+=(i%2===0?c:v)[Math.floor(Math.random()*(i%2===0?c:v).length)];return s;}

// STATE
let myName='',myId=rnd(4),mode='',pendingMode='';
let roomCode='',aesKey=null,mqtt=null,connected=false;
const seen=new Set();
const roomTopic=c=>'agora/room/'+c;
const ctrlTopic=c=>'agora/ctrl/'+c;

// SHEET
function showNameSheet(m){
  pendingMode=m;
  document.getElementById('sheet-name').value=myName||'';
  document.getElementById('sheet-overlay').classList.remove('off');
  setTimeout(()=>document.getElementById('sheet-name').focus(),120);
}
async function confirmName(){
  const n=document.getElementById('sheet-name').value.trim();
  if(!n){document.getElementById('sheet-name').style.borderBottomColor='#664444';setTimeout(()=>document.getElementById('sheet-name').style.borderBottomColor='',800);return;}
  myName=n;document.getElementById('sheet-overlay').classList.add('off');
  if(pendingMode==='host')await createRoom();
}

// JOIN from landing
async function tryJoin(){
  const n=document.getElementById('land-name').value.trim();
  const c=document.getElementById('land-code').value.trim().toUpperCase();
  setErr('');
  if(!n){document.getElementById('land-name').style.borderBottomColor='#664444';setTimeout(()=>document.getElementById('land-name').style.borderBottomColor='',800);return;}
  if(c.length!==6){setErr('six letters');return;}
  myName=n;await joinRoom(c);
}

// CREATE
async function createRoom(){
  roomCode=genCode();mode='host';aesKey=await deriveKey(roomCode);
  openChatScreen();
  document.getElementById('btn-close').style.display='block';
  document.getElementById('btn-leave').style.display='none';
  connectMQTT(()=>{
    mqtt.subscribe(roomTopic(roomCode));mqtt.subscribe(ctrlTopic(roomCode));
    setStatus(true,roomCode.toLowerCase());enableInput(true);
    addSys('room open · code: '+roomCode);
    addSys('share the code — only those who have it can enter');
  });
}

// JOIN
async function joinRoom(code){
  roomCode=code;mode='guest';aesKey=await deriveKey(code);
  openChatScreen();
  document.getElementById('btn-close').style.display='none';
  document.getElementById('btn-leave').style.display='block';
  connectMQTT(()=>{
    mqtt.subscribe(roomTopic(roomCode));mqtt.subscribe(ctrlTopic(roomCode));
    setStatus(true,roomCode.toLowerCase());enableInput(true);
    pubCtrl({type:'join',nick:myName,id:myId});
    addSys('entered the agora · '+roomCode.toLowerCase());
  });
}

// MQTT
function connectMQTT(onReady){
  const cid='agora_'+rnd(8);
  mqtt=new Paho.MQTT.Client('broker.hivemq.com',8884,'/mqtt',cid);
  mqtt.onConnectionLost=()=>{connected=false;setStatus(false,'reconnecting');enableInput(false);setTimeout(()=>connectMQTT(onReady),3500);};
  mqtt.onMessageArrived=onMsg;
  mqtt.connect({useSSL:true,timeout:12,keepAliveInterval:25,
    onSuccess:()=>{connected=true;onReady&&onReady();},
    onFailure:()=>setTimeout(()=>connectMQTT(onReady),4000)});
}
async function onMsg(m){
  try{
    const d=JSON.parse(m.payloadString);
    if(m.destinationName===ctrlTopic(roomCode)){
      if(d.type==='join'&&d.id!==myId){addSys((d.nick||'someone')+' entered');if(mode==='host')pubCtrl({type:'host_ack',nick:myName,id:myId});}
      if(d.type==='leave'&&d.id!==myId)addSys((d.nick||'someone')+' left');
      if(d.type==='room_closed'&&mode==='guest'){addSys('the host closed the room — all messages are gone');enableInput(false);setTimeout(()=>cleanAndHome(),2200);}
      return;
    }
    if(d.enc&&d.id&&!seen.has(d.id)){seen.add(d.id);const txt=await dec(aesKey,d.enc);if(txt!==null)addBubble(txt,d.nick||'?',d.ts||Date.now(),d.cid===myId);}
  }catch{}
}
function pubCtrl(obj){if(!connected)return;const m=new Paho.MQTT.Message(JSON.stringify(obj));m.destinationName=ctrlTopic(roomCode);mqtt.send(m);}

// SEND
async function sendMsg(){
  if(!connected||!aesKey)return;
  const inp=document.getElementById('inp');const txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='';
  const id=rnd()+'_'+Date.now();seen.add(id);
  const e=await enc(aesKey,txt);
  const m=new Paho.MQTT.Message(JSON.stringify({enc:e,nick:myName,ts:Date.now(),id,cid:myId}));
  m.destinationName=roomTopic(roomCode);mqtt.send(m);
  addBubble(txt,myName,Date.now(),true);inp.focus();
}

// CLOSE / LEAVE
function closeRoom(){pubCtrl({type:'room_closed'});setTimeout(()=>cleanAndHome(),400);}
function leaveRoom(){pubCtrl({type:'leave',nick:myName,id:myId});cleanAndHome();}
function cleanAndHome(){
  try{mqtt.unsubscribe(roomTopic(roomCode));mqtt.unsubscribe(ctrlTopic(roomCode));}catch{}
  aesKey=null;roomCode='';mode='';seen.clear();
  document.getElementById('msgs').innerHTML='<div class="chat-empty" id="chat-empty"><div class="ce-label">Encrypted channel</div><div class="ce-sub">messages are encrypted before leaving your device<br>no one else can read this</div></div>';
  document.getElementById('land-code').value='';setErr('');showScr('s-land');
}

// UI
function openChatScreen(){document.getElementById('chat-room-code').textContent='';enableInput(false);setStatus(false,'connecting');showScr('s-chat');}
function showScr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.toggle('off',s.id!==id));}
function setStatus(on,txt){document.getElementById('sdot').className='sdot'+(on?' on':'');document.getElementById('chat-st').textContent=txt;if(on&&roomCode)document.getElementById('chat-room-code').textContent=roomCode;}
function enableInput(on){document.getElementById('inp').disabled=!on;document.getElementById('btn-send').disabled=!on;if(on)document.getElementById('inp').focus();}
function addBubble(txt,nick,ts,isMe){
  const empty=document.getElementById('chat-empty');if(empty)empty.remove();
  const msgs=document.getElementById('msgs');const row=document.createElement('div');
  row.className='msg-row '+(isMe?'me':'them');
  const t=new Date(ts).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false});
  row.innerHTML=`${!isMe?`<div class="msg-nick">${esc(nick)}</div>`:''}<div class="msg-bubble">${esc(txt)}</div><div class="msg-time">${t}</div>`;
  msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}
function addSys(txt){
  const empty=document.getElementById('chat-empty');if(empty)empty.remove();
  const d=document.createElement('div');d.className='sys-msg';d.textContent='— '+txt+' —';
  document.getElementById('msgs').appendChild(d);document.getElementById('msgs').scrollTop=9999;
}
function setErr(msg){document.getElementById('err-msg').textContent=msg;}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
document.getElementById('land-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('land-code').focus();});
</script>
</body>
</html>
